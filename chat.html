<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Transcription</title>
  <link href="./src/styles/common.css" rel="stylesheet" />
  <style>
    @import url("https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css");

    body {
      background: transparent !important;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        sans-serif;
    }

    .chat-container {
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg,
          rgba(0, 0, 0, 0.3) 0%,
          rgba(20, 20, 20, 0.4) 100%);
      backdrop-filter: blur(25px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      cursor: move;
      flex-shrink: 0;
    }

    .header-title {
      color: rgba(255, 255, 255, 0.95);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      pointer-events: none;
    }

    .recording-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4757;
      animation: pulse 2s infinite;
      display: none;
      box-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
    }

    @keyframes pulse {
      0% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.7;
        transform: scale(1.1);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-app-region: no-drag;
      box-sizing: border-box;
      /* Removed max-height restriction */
    }

    .message {
      margin-bottom: 16px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      border-left: 3px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(5px);
      word-wrap: break-word;
      word-break: break-word;
      /* Removed all height restrictions */
    }

    .message.transcription {
      background: rgba(76, 175, 80, 0.15);
      animation: fadeInSlide 0.1s ease-out;
      position: relative;
    }

    .message.transcription::before {
      position: absolute;
      left: -8px;
      top: 8px;
      font-size: 12px;
      color: white;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes fadeInSlide {
      from {
        opacity: 0;
        transform: translateX(-20px);
        background: rgba(76, 175, 80, 0.3);
      }

      to {
        opacity: 1;
        transform: translateX(0);
        background: rgba(76, 175, 80, 0.15);
      }
    }

    .message.system {
      background: rgba(33, 150, 243, 0.1);
    }

    .message.error {
      background: rgba(244, 67, 54, 0.1);
    }

    .message.user {
      background: rgba(255, 152, 0, 0.1);
    }

    .message.assistant {
      background: rgba(156, 39, 176, 0.1);
      border-left: 3px solid #9c27b0;
      /* Removed all height restrictions and overflow hidden */
      display: block;
    }

    .message.assistant .message-text {
      /* Removed all height restrictions and overflow hidden */
      white-space: normal;
      word-wrap: break-word;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    .message.assistant .message-text pre,
    .message.assistant .message-text code {
      white-space: pre-wrap;
    }

    /* Ensure all content in assistant messages is fully visible */
    .message.assistant *,
    .message.assistant .bullet-point,
    .message.assistant .numbered-point,
    .message.assistant strong,
    .message.assistant em,
    .message.assistant code,
    .message.assistant pre,
    .message.assistant ul,
    .message.assistant ol,
    .message.assistant li,
    .message.assistant h1,
    .message.assistant h2,
    .message.assistant h3,
    .message.assistant h4,
    .message.assistant h5,
    .message.assistant h6,
    .message.assistant p,
    .message.assistant blockquote {
      /* Remove all height restrictions */
      height: auto !important;
      max-height: none !important;
      overflow: visible !important;
    }

    /* Markdown formatting for assistant messages */
    .message.assistant .bullet-point {
      margin: 4px 0;
      padding-left: 8px;
      line-height: 1.4;
      word-wrap: break-word;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    .message.assistant .numbered-point {
      margin: 4px 0;
      padding-left: 16px;
      line-height: 1.4;
      position: relative;
      counter-increment: list-counter;
      word-wrap: break-word;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    .message.assistant .numbered-point::before {
      content: counter(list-counter) ". ";
      position: absolute;
      left: 0;
      font-weight: 500;
      color: rgba(156, 39, 176, 0.8);
    }

    .message.assistant {
      counter-reset: list-counter;
    }

    .message.assistant strong {
      font-weight: 600;
      color: rgba(255, 255, 255, 1);
    }

    .message.assistant em {
      font-style: italic;
      color: rgba(255, 255, 255, 0.9);
    }

    .message.assistant code {
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 4px;
      border-radius: 3px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 11px;
      color: #64ffda;
      display: inline;
    }

    /* Ensure code blocks are fully visible */
    .message.assistant pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 12px;
      border-radius: 6px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 11px;
      color: #64ffda;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      margin: 8px 0;
    }

    .message.assistant pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
    }

    /* Ensure lists are fully visible */
    .message.assistant ul,
    .message.assistant ol {
      margin: 8px 0;
      padding-left: 20px;
    }

    .message.assistant li {
      margin: 4px 0;
      line-height: 1.4;
    }

    /* Ensure headings are fully visible */
    .message.assistant h1,
    .message.assistant h2,
    .message.assistant h3,
    .message.assistant h4,
    .message.assistant h5,
    .message.assistant h6 {
      margin: 12px 0 8px 0;
      font-weight: 600;
      color: rgba(255, 255, 255, 1);
    }

    .message.assistant h1 {
      font-size: 16px;
    }

    .message.assistant h2 {
      font-size: 15px;
    }

    .message.assistant h3 {
      font-size: 14px;
    }

    .message.assistant h4,
    .message.assistant h5,
    .message.assistant h6 {
      font-size: 13px;
    }

    /* Ensure paragraphs are fully visible */
    .message.assistant p {
      margin: 8px 0;
    }

    /* Ensure blockquotes are fully visible */
    .message.assistant blockquote {
      border-left: 3px solid rgba(156, 39, 176, 0.5);
      padding-left: 12px;
      margin: 8px 0;
      font-style: italic;
      color: rgba(255, 255, 255, 0.8);
    }

    /* Thinking indicator animation */
    .thinking-dots {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .thinking-dots .dot {
      opacity: 0.4;
      animation: thinking 1.4s infinite ease-in-out;
    }

    .thinking-dots .dot:nth-child(1) {
      animation-delay: 0s;
    }

    .thinking-dots .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .thinking-dots .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes thinking {

      0%,
      80%,
      100% {
        opacity: 0.4;
        transform: scale(1);
      }

      40% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    .message.thinking {
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-time {
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .message-text {
      color: rgba(255, 255, 255, 0.95);
      font-size: 13px;
      line-height: 1.4;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      word-wrap: break-word;
      word-break: break-word;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      max-width: 100%;
      display: block;
    }

    .chat-input {
      padding: 16px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      -webkit-app-region: no-drag;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    .input-container {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      -webkit-app-region: no-drag;
    }

    .input-field {
      flex: 1;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.95);
      font-size: 13px;
      outline: none;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .send-button {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }

    .send-button:hover {
      background: rgba(255, 255, 255, 0.25);
      color: rgba(255, 255, 255, 1);
    }

    .status-message {
      text-align: center;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      padding: 20px;
      font-style: italic;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .error-message {
      color: #ff4757;
      font-size: 12px;
      padding: 10px;
      text-align: center;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    .mic-button {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }

    .mic-button:hover {
      background: rgba(255, 255, 255, 0.25);
      color: rgba(255, 255, 255, 1);
    }

    .mic-button.recording {
      background: rgba(255, 71, 87, 0.85);
      color: white;
      box-shadow: 0 0 15px rgba(255, 71, 87, 0.5);
      animation: micButtonPulse 2s infinite ease-in-out;
    }

    /* Pulse animation for the active mic button */
    @keyframes micButtonPulse {
      0%, 100% {
        box-shadow: 0 0 10px rgba(255, 71, 87, 0.4);
      }
      50% {
        box-shadow: 0 0 20px rgba(255, 71, 87, 0.7);
      }
    }

    /* Pulse animation for the active header mic icon */
    .chat-header .header-title i.fa-microphone.recording {
      color: #ff4757;
      text-shadow: 0 0 10px rgba(255, 71, 87, 0.6);
      animation: micPulse 1.5s infinite ease-in-out;
      display: inline-block;
    }

    @keyframes micPulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.15);
        opacity: 0.8;
      }
    }

    .help-text {
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      text-align: center;
      padding: 10px;
      line-height: 1.4;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .interaction-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      color: rgba(255, 255, 255, 0.9);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 1000;
    }

    .interaction-indicator.show {
      opacity: 1;
    }

    .interaction-indicator.interactive {
      background: rgba(76, 175, 80, 0.9);
    }

    .interaction-indicator.non-interactive {
      background: rgba(244, 67, 54, 0.9);
    }

    .non-interactive .input-container {
      pointer-events: none;
      opacity: 0.5;
    }

    .non-interactive .mic-button {
      pointer-events: none;
      opacity: 0.5;
    }

    .non-interactive .send-button {
      pointer-events: none;
      opacity: 0.5;
    }

    /* Minimalist Listening Animation */
    .listening-indicator {
      display: none;
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(203, 203, 203, 0.3);
      border-radius: 20px;
      padding: 8px 16px;
      z-index: 1000;
      pointer-events: none;
    }

    .listening-indicator.active {
      display: flex;
      align-items: center;
      gap: 8px;
      animation: fadeInUp 0.3s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .listening-wave {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .wave-bar {
      width: 2px;
      background: #4caf50;
      border-radius: 1px;
      animation: waveAnimation 1.2s infinite ease-in-out;
    }

    .wave-bar:nth-child(1) {
      height: 8px;
      animation-delay: 0s;
    }

    .wave-bar:nth-child(2) {
      height: 12px;
      animation-delay: 0.15s;
    }

    .wave-bar:nth-child(3) {
      height: 16px;
      animation-delay: 0.3s;
    }

    .wave-bar:nth-child(4) {
      height: 12px;
      animation-delay: 0.45s;
    }

    .wave-bar:nth-child(5) {
      height: 8px;
      animation-delay: 0.6s;
    }

    @keyframes waveAnimation {

      0%,
      100% {
        transform: scaleY(0.3);
        opacity: 0.6;
      }

      50% {
        transform: scaleY(1);
        opacity: 1;
      }
    }

    .listening-text {
      color: rgba(255, 255, 255, 0.9);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .listening-duration {
      color: rgba(76, 175, 80, 0.8);
      font-size: 10px;
      font-family: monospace;
      margin-left: 4px;
    }

    /* Interim text overlay - legacy, kept for compatibility */
    .interim-overlay {
      position: fixed;
      bottom: 80px;
      left: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.028);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(76, 175, 80, 0.3);
      border-radius: 8px;
      padding: 12px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      font-style: italic;
      z-index: 998;
      pointer-events: none;
      display: none;
      animation: slideUpFade 0.3s ease-out;
    }

    .interim-overlay.active {
      display: none;
      /* Hide old overlay, use new live transcript box */
    }

    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Screenshot preview banner */
    .screenshot-banner {
      display: none;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(168, 85, 247, 0.2) 100%);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 8px;
      padding: 12px 16px;
      margin: 10px 20px;
      -webkit-app-region: no-drag;
      animation: slideDown 0.3s ease-out;
    }

    .screenshot-banner.active {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .screenshot-preview {
      width: 60px;
      height: 40px;
      border-radius: 6px;
      border: 2px solid rgba(168, 85, 247, 0.5);
      object-fit: cover;
      flex-shrink: 0;
    }

    .screenshot-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .screenshot-title {
      color: rgba(255, 255, 255, 0.95);
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .screenshot-title i {
      color: #a855f7;
    }

    .screenshot-hint {
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
    }

    .screenshot-dismiss {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 4px;
      padding: 6px 10px;
      color: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }

    .screenshot-dismiss:hover {
      background: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 1);
    }

    /* Pulsing indicator for screenshot mode */
    .screenshot-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #a855f7;
      animation: screenshotPulse 1.5s infinite;
      display: none;
    }

    .screenshot-indicator.active {
      display: inline-block;
    }

    @keyframes screenshotPulse {
      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.5);
      }
      50% {
        opacity: 0.8;
        box-shadow: 0 0 0 6px rgba(168, 85, 247, 0);
      }
    }

    /* Layout Separation Elements */
    .chat-main-layout {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      min-height: 0;
    }

    .conversation-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 300px;
    }

    .transcript-pane {
      width: 300px;
      display: flex;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.15);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .transcript-pane.collapsed {
      width: 0;
      border-left: none;
    }

    .pane-header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .pane-title {
      color: rgba(255, 255, 255, 0.95);
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .export-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      color: rgba(255, 255, 255, 0.85);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .export-btn:hover {
      background: rgba(76, 175, 80, 0.2);
      color: white;
    }

    .transcript-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Transcript Segment Styles */
    .transcript-segment {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      border-left: 3px solid rgba(76, 175, 80, 0.5);
      animation: fadeInSlide 0.2s ease-out;
    }

    .transcript-segment.interim {
      border-left: 3px dashed rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.02);
      color: rgba(255, 255, 255, 0.6);
      font-style: italic;
    }

    .transcript-time {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 2px;
      display: block;
      font-family: monospace;
    }

    .transcript-text {
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      word-break: break-word;
    }

    /* Activity/System Log Area */
    .activity-pane {
      height: 160px;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(15px);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
    }

    .activity-pane.collapsed {
      height: 0;
      border-top: none;
    }

    .activity-header {
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.25);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .activity-title {
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.5px;
    }

    .close-activity-btn {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      font-size: 12px;
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-activity-btn:hover {
      color: white;
    }

    .activity-logs {
      flex: 1;
      padding: 10px 16px;
      overflow-y: auto;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      font-size: 11px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .log-entry {
      line-height: 1.4;
      word-wrap: break-word;
      word-break: break-all;
    }

    .log-entry.info {
      color: rgba(255, 255, 255, 0.7);
    }

    .log-entry.success {
      color: #81c784;
    }

    .log-entry.error {
      color: #e57373;
    }

    .log-time {
      color: rgba(255, 255, 255, 0.3);
      margin-right: 8px;
    }

    /* Header Actions */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .header-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .header-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border-color: rgba(255, 255, 255, 0.15);
    }

    .header-btn.active {
      background: rgba(76, 175, 80, 0.2);
      color: #81c784;
      border-color: rgba(76, 175, 80, 0.3);
    }

    .header-btn.active:hover {
      background: rgba(76, 175, 80, 0.3);
    }
  </style>
</head>

<body>
  <div class="chat-container" id="chatContainer">
    <div class="chat-header">
      <div class="header-title">
        <i class="fas fa-microphone"></i>
        Live Transcription & Chat
        <div class="recording-indicator" id="recordingIndicator"></div>
        <div class="screenshot-indicator" id="screenshotIndicator"></div>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="toggleTranscriptBtn" title="Toggle Transcript Pane">
          <i class="fas fa-file-alt"></i>
        </button>
        <button class="header-btn" id="toggleActivityBtn" title="Toggle Activity Log">
          <i class="fas fa-terminal"></i>
        </button>
        <button class="header-btn" id="clearSessionBtn" title="Clear Session Memory">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>

    <div class="chat-main-layout">
      <!-- Left Column: Main Conversation Area -->
      <div class="conversation-pane" id="conversationPane">
        <!-- Screenshot Preview Banner -->
        <div class="screenshot-banner" id="screenshotBanner">
          <img class="screenshot-preview" id="screenshotPreview" src="" alt="Screenshot preview">
          <div class="screenshot-info">
            <div class="screenshot-title">
              <i class="fas fa-image"></i>
              Screenshot Ready for AI
            </div>
            <div class="screenshot-hint">Type your question about this screenshot and press Enter</div>
          </div>
          <button class="screenshot-dismiss" id="screenshotDismiss">
            <i class="fas fa-times"></i> Dismiss
          </button>
        </div>

        <!-- Listening Indicator (legacy, minimal) -->
        <div class="listening-indicator" id="listeningIndicator">
          <div class="listening-wave">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
          </div>
          <span class="listening-text">Listening</span>
          <span class="listening-duration" id="listeningDuration">0s</span>
        </div>

        <!-- Interim Text Overlay (legacy) -->
        <div class="interim-overlay" id="interimOverlay"></div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input">
          <div class="input-container">
            <input type="text" class="input-field" placeholder="Optional: add or edit your question, then press Enter" id="messageInput" />
            <button class="mic-button" id="micButton">
              <i class="fas fa-microphone"></i>
            </button>
            <button class="send-button" id="sendButton">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="transcript-pane collapsed" id="transcriptPane">
        <div class="pane-header">
          <div class="pane-title" style="display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-file-alt"></i> Transcript Timeline
            <span id="whisperStatusIndicator" style="font-size: 11px; font-weight: normal; color: #ffa726; display: none; align-items: center; gap: 4px;">
              <i class="fas fa-spinner fa-spin"></i> Transcribing...
            </span>
          </div>
          <button class="export-btn" id="exportTranscriptBtn" title="Export Transcript to TXT">
            <i class="fas fa-download"></i> Export
          </button>
        </div>
        <div class="transcript-messages" id="transcriptMessages">
          <div class="status-message" id="emptyTranscriptMsg">No transcription yet. Turn on the microphone to begin capture.</div>
        </div>
      </div>
    </div>

    <!-- Bottom Pane: Activity / System Log Area (Collapsible) -->
    <div class="activity-pane collapsed" id="activityPane">
      <div class="activity-header">
        <div class="activity-title">
          <i class="fas fa-terminal"></i> Activity Log
        </div>
        <button class="close-activity-btn" id="closeActivityBtn">
          <i class="fas fa-chevron-down"></i>
        </button>
      </div>
      <div class="activity-logs" id="activityLogs"></div>
    </div>
  </div>
  <script src="lib/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="src/ui/web-speech_service.js"></script>
  <script src="src/ui/meeting-listening.js"></script>
  <script>
    // Use electronAPI from preload script instead of direct require
    const whysperAPI = window.electronAPI;

    const chatMessages = document.getElementById('chatMessages');
    const recordingIndicator = document.getElementById('recordingIndicator');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const micButton = document.getElementById('micButton');
    const chatContainer = document.getElementById('chatContainer');
    const listeningIndicator = document.getElementById('listeningIndicator');
    const listeningDuration = document.getElementById('listeningDuration');
    const interimOverlay = document.getElementById('interimOverlay');
    const screenshotBanner = document.getElementById('screenshotBanner');
    const screenshotPreview = document.getElementById('screenshotPreview');
    const screenshotIndicator = document.getElementById('screenshotIndicator');
    const screenshotDismiss = document.getElementById('screenshotDismiss');


    // New Separation Elements
    const toggleTranscriptBtn = document.getElementById('toggleTranscriptBtn');
    const toggleActivityBtn = document.getElementById('toggleActivityBtn');
    const clearSessionBtn = document.getElementById('clearSessionBtn');
    const exportTranscriptBtn = document.getElementById('exportTranscriptBtn');
    const closeActivityBtn = document.getElementById('closeActivityBtn');
    
    const transcriptPane = document.getElementById('transcriptPane');
    const transcriptMessages = document.getElementById('transcriptMessages');
    
    const activityPane = document.getElementById('activityPane');
    const activityLogs = document.getElementById('activityLogs');

    let isListening = false;
    let isInteractive = true;
    let listeningStartTime = null;
    let listeningTimer = null;
    let hasPendingScreenshot = false;

    let audioLevelHint = 'Waiting for audio…';

    // Activity logging utility
    function logActivity(text, type = 'info') {
      if (!activityLogs) return;
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      
      const timeSpan = document.createElement('span');
      timeSpan.className = 'log-time';
      timeSpan.textContent = new Date().toLocaleTimeString();
      
      const textSpan = document.createElement('span');
      textSpan.textContent = text;
      
      entry.appendChild(timeSpan);
      entry.appendChild(textSpan);
      
      activityLogs.appendChild(entry);
      activityLogs.scrollTop = activityLogs.scrollHeight;
    }

    // Render Transcript Timeline
    function renderTranscriptTimeline() {
      if (!transcriptMessages) return;
      
      const segments = meetingListener.transcriptBuffer.segments || [];
      
      if (segments.length === 0) {
        transcriptMessages.innerHTML = '<div class="status-message" id="emptyTranscriptMsg">No transcription yet. Turn on the microphone to begin capture.</div>';
        return;
      }
      
      transcriptMessages.innerHTML = '';
      
      segments.forEach((seg) => {
        const segDiv = document.createElement('div');
        segDiv.className = 'transcript-segment';
        
        const timeSpan = document.createElement('span');
        timeSpan.className = 'transcript-time';
        const date = new Date(seg.timestamp);
        timeSpan.textContent = date.toLocaleTimeString();
        
        const textSpan = document.createElement('span');
        textSpan.className = 'transcript-text';
        textSpan.textContent = seg.text;
        
        segDiv.appendChild(timeSpan);
        segDiv.appendChild(textSpan);
        transcriptMessages.appendChild(segDiv);
      });
      
      transcriptMessages.scrollTop = transcriptMessages.scrollHeight;
    }

    // Panel Toggle Functions
    async function toggleTranscript() {
      const isCollapsed = transcriptPane.classList.toggle('collapsed');
      toggleTranscriptBtn.classList.toggle('active', !isCollapsed);
      localStorage.setItem('transcriptCollapsed', isCollapsed);

      // Adjust window width dynamically: 500px if collapsed, 800px if expanded
      if (whysperAPI && whysperAPI.getWindowStats && whysperAPI.resizeWindow) {
        try {
          const stats = await whysperAPI.getWindowStats();
          const chatWindow = stats.windows?.chat;
          const currentHeight = chatWindow ? chatWindow.height : 700;
          const targetWidth = isCollapsed ? 500 : 800;
          await whysperAPI.resizeWindow(targetWidth, currentHeight);
        } catch (error) {
          console.error('Failed to resize window:', error);
        }
      }
    }

    function toggleActivity() {
      const isCollapsed = activityPane.classList.toggle('collapsed');
      toggleActivityBtn.classList.toggle('active', !isCollapsed);
      localStorage.setItem('activityCollapsed', isCollapsed);
    }

    // Export Transcript
    function exportTranscript() {
      const fullText = meetingListener.getFullTranscript();
      if (!fullText) {
        logActivity('No transcription available to export.', 'error');
        return;
      }

      try {
        const dateStr = new Date().toISOString().replace(/[:.]/g, '-');
        const filename = `transcript-${dateStr}.txt`;
        
        let output = `Vysper Meeting Transcript\n`;
        output += `Exported: ${new Date().toLocaleString()}\n`;
        output += `========================================\n\n`;
        
        meetingListener.transcriptBuffer.segments.forEach((seg) => {
          const time = new Date(seg.timestamp).toLocaleTimeString();
          output += `[${time}] (${seg.source}): ${seg.text}\n\n`;
        });
        
        const blob = new Blob([output], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        logActivity(`Transcript exported successfully as ${filename}`, 'success');
      } catch (error) {
        logActivity(`Failed to export transcript: ${error.message}`, 'error');
      }
    }

    const meetingListener = new MeetingListening.ContinuousListeningManager({
      includeMicrophone: true,
      onStatus: (status) => {
        logActivity(status, 'info');
      },
      onError: (error) => {
        const lowerErr = error.toLowerCase();
        const isMicError = lowerErr.includes('permission') || 
                           lowerErr.includes('not-allowed') || 
                           lowerErr.includes('not available') || 
                           lowerErr.includes('audio-capture') ||
                           lowerErr.includes('initialization') ||
                           lowerErr.includes('no system audio');
        if (isMicError) {
          addMessage(`Meeting audio error: ${error}`, 'error');
        } else {
          logActivity(`Meeting audio warning: ${error}`, 'warning');
        }
      },
      onListeningChange: (listening) => {
        isListening = listening;
        if (listening) {
          if (whysperAPI && whysperAPI.sendRecordingStarted) {
            whysperAPI.sendRecordingStarted();
          }
          handleListeningStarted();
        } else {
          if (whysperAPI && whysperAPI.sendRecordingStopped) {
            whysperAPI.sendRecordingStopped();
          }
          handleListeningStopped();
        }
      },
      onLevelUpdate: ({ systemLevel, micActive, capturing }) => {
        const bars = capturing ? '▮▮▮' : '▯▯▯';
        audioLevelHint = `System audio level: ${systemLevel}${micActive ? ' • Mic active' : ' • Mic off'} ${bars}`;
        if (isListening && transcriptInterim) {
          transcriptInterim.textContent = audioLevelHint;
        }
      }
    });

    function refreshTranscriptPreview() {
      const full = meetingListener.getFullTranscript();
      const pending = meetingListener.getNewSinceLastAnswer();
      if (full) {
        updateLiveTranscript(full, pending ? `(new since last answer: ${pending.substring(0, 120)}${pending.length > 120 ? '…' : ''})` : '');
      } else if (isListening) {
        updateLiveTranscript('', audioLevelHint);
      }
      
      // Sync Transcript Timeline Area
      renderTranscriptTimeline();
    }

    // Legacy alias for global shortcut handler name
    const audioRecognition = meetingListener;

    // Obsolete Live Transcript Functions (removed live transcript box)
    function showLiveTranscriptBox() {}
    function hideLiveTranscriptBox() {}
    function updateLiveTranscript(finalText, interimText) {}

    // Basic message function with markdown support for assistant messages
    function addMessage(text, type = 'user') {
      // Route system, error and transcription confirmations to activity log
      if (type === 'system' || type === 'error' || type === 'transcription') {
        logActivity(text, type === 'error' ? 'error' : (type === 'transcription' ? 'success' : 'info'));
        return;
      }

      if (!chatMessages) {
        console.error('Chat messages element not found!');
        return;
      }

      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${type}`;

      const timeDiv = document.createElement('div');
      timeDiv.className = 'message-time';
      timeDiv.textContent = new Date().toLocaleTimeString();

      const textDiv = document.createElement('div');
      textDiv.className = 'message-text';

      // Format assistant messages as markdown
      if (type === 'assistant') {
        textDiv.innerHTML = formatMarkdown(text);
      } else {
        textDiv.textContent = text;
      }

      messageDiv.appendChild(timeDiv);
      messageDiv.appendChild(textDiv);

      chatMessages.appendChild(messageDiv);
      if (type === 'assistant') {
        setTimeout(() => {
          messageDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 50);
      } else {
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }
    }

    // Markdown formatter using markdown.js library
    function formatMarkdown(text) {
      if (!text) return '';

      try {
        // Use marked library if available for modern GFM parsing
        if (typeof marked !== 'undefined' && marked.parse) {
          if (!window._markedConfigured) {
            marked.setOptions({
              breaks: false,
              gfm: true
            });
            window._markedConfigured = true;
          }
          return marked.parse(text);
        } else if (typeof markdown !== 'undefined' && markdown.toHTML) {
          return markdown.toHTML(text);
        } else {
          console.warn('Markdown library not loaded, falling back to basic formatting');
          // Fallback to basic formatting if library fails to load
          return text
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/`(.+?)`/g, '<code>$1</code>')
            .replace(/\n/g, '<br>');
        }
      } catch (error) {
        console.error('Markdown parsing failed:', error);
        // Fallback to basic HTML escaping
        return text.replace(/\n/g, '<br>');
      }
    }

    // Show thinking indicator
    function showThinkingIndicator() {
      const thinkingDiv = document.createElement('div');
      thinkingDiv.className = 'message assistant thinking';
      thinkingDiv.id = 'thinking-indicator';

      const timeDiv = document.createElement('div');
      timeDiv.className = 'message-time';
      timeDiv.textContent = new Date().toLocaleTimeString();

      const textDiv = document.createElement('div');
      textDiv.className = 'message-text thinking-dots';
      textDiv.innerHTML = '<span class="dot">•</span><span class="dot">•</span><span class="dot">•</span>';

      thinkingDiv.appendChild(timeDiv);
      thinkingDiv.appendChild(textDiv);

      chatMessages.appendChild(thinkingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Hide thinking indicator
    function hideThinkingIndicator() {
      const thinkingIndicator = document.getElementById('thinking-indicator');
      if (thinkingIndicator) {
        thinkingIndicator.remove();
      }
    }

    // Minimalist Listening Animation Functions
    function showListeningAnimation() {
      if (listeningIndicator) {
        listeningIndicator.classList.add('active');

        // Start timer
        listeningStartTime = Date.now();
        listeningTimer = setInterval(() => {
          if (listeningStartTime && listeningDuration) {
            const elapsed = Math.floor((Date.now() - listeningStartTime) / 1000);
            listeningDuration.textContent = `${elapsed}s`;
          }
        }, 1000);
      }
    }

    function hideListeningAnimation() {
      if (listeningIndicator) {
        listeningIndicator.classList.remove('active');
      }

      // Hide interim overlay
      if (interimOverlay) {
        interimOverlay.classList.remove('active');
      }

      // Clear timer
      if (listeningTimer) {
        clearInterval(listeningTimer);
        listeningTimer = null;
      }

      listeningStartTime = null;
    }

    function showInterimText(text) {
      if (!interimOverlay) return;

      if (text && text.trim()) {
        interimOverlay.textContent = text;
        interimOverlay.classList.add('active');
        
        // Show in Transcript Pane in real-time
        if (transcriptMessages) {
          // Remove empty message if visible
          const emptyMsg = document.getElementById('emptyTranscriptMsg');
          if (emptyMsg) emptyMsg.remove();
          
          let interimSeg = document.getElementById('interimTranscriptSegment');
          if (!interimSeg) {
            interimSeg = document.createElement('div');
            interimSeg.id = 'interimTranscriptSegment';
            interimSeg.className = 'transcript-segment interim';
            
            const timeSpan = document.createElement('span');
            timeSpan.className = 'transcript-time';
            timeSpan.textContent = new Date().toLocaleTimeString();
            
            const textSpan = document.createElement('span');
            textSpan.className = 'transcript-text';
            
            interimSeg.appendChild(timeSpan);
            interimSeg.appendChild(textSpan);
            transcriptMessages.appendChild(interimSeg);
          }
          interimSeg.querySelector('.transcript-text').textContent = text;
          transcriptMessages.scrollTop = transcriptMessages.scrollHeight;
        }
      } else {
        interimOverlay.classList.remove('active');
        
        // Remove from Transcript Pane
        const interimSeg = document.getElementById('interimTranscriptSegment');
        if (interimSeg) {
          interimSeg.remove();
        }
      }
    }

    // Listening Event Handlers
    function handleListeningStarted() {
      if (recordingIndicator) {
        recordingIndicator.style.display = 'block';
      }
      if (micButton) {
        micButton.classList.add('recording');
      }
      // Add recording class to the header microphone icon
      const headerMicIcon = document.querySelector('.chat-header .header-title i.fa-microphone');
      if (headerMicIcon) {
        headerMicIcon.classList.add('recording');
      }

      showLiveTranscriptBox();
      showListeningAnimation();
      updateLiveTranscript(meetingListener.getFullTranscript(), audioLevelHint);
    }

    function handleListeningStopped() {
      if (recordingIndicator) {
        recordingIndicator.style.display = 'none';
      }
      if (micButton) {
        micButton.classList.remove('recording');
      }
      // Remove recording class from the header microphone icon
      const headerMicIcon = document.querySelector('.chat-header .header-title i.fa-microphone');
      if (headerMicIcon) {
        headerMicIcon.classList.remove('recording');
      }

      hideLiveTranscriptBox();
      hideListeningAnimation();
      refreshTranscriptPreview();
    }

    // Backward-compatible aliases for IPC events
    function handleRecordingStarted() {
      handleListeningStarted();
    }

    function handleRecordingStopped() {
      handleListeningStopped();
    }

    async function submitAnswer() {
      const manualText = messageInput ? messageInput.value.trim() : '';

      try {
        let hasScreenshot = false;
        if (whysperAPI && whysperAPI.hasPendingScreenshot) {
          const res = await whysperAPI.hasPendingScreenshot();
          hasScreenshot = !!res.hasPendingScreenshot;
        }

        const newTranscript = meetingListener.getNewSinceLastAnswer();
        if (!manualText && !newTranscript && !hasScreenshot) {
          addMessage('No speech captured yet. Please speak or type a question.', 'system');
          return;
        }

        if (manualText) {
          addMessage(manualText, 'user');
        } else if (newTranscript) {
          addMessage(`Heard: "${newTranscript.substring(0, 200)}${newTranscript.length > 200 ? '…' : ''}"`, 'transcription');
        }

        if (messageInput) {
          messageInput.value = '';
        }

        refreshTranscriptPreview();

        setTimeout(() => {
          showThinkingIndicator();
        }, 300);

        if (whysperAPI && whysperAPI.sendChatMessage) {
          await whysperAPI.sendChatMessage(manualText);
        }

        meetingListener.markAnswerSent();
        refreshTranscriptPreview();
      } catch (error) {
        hideThinkingIndicator();
        addMessage(`Failed to submit answer: ${error.message}`, 'error');
        console.error('submitAnswer failed:', error);
      }
    }

    // Basic IPC Event Listeners

    if (whysperAPI) {
      // Listen for local Whisper transcription segments
      whysperAPI.onTranscriptSegment((segment) => {
        if (segment && segment.text) {
          meetingListener.transcriptBuffer.appendSegment(segment.text, 'whisper');
          refreshTranscriptPreview();
        }
      });

      // Listen for Whisper status to show "Transcribing..." indicator
      whysperAPI.onWhisperStatus((data) => {
        const indicator = document.getElementById('whisperStatusIndicator');
        if (indicator) {
          if (data && data.status === 'transcribing') {
            indicator.style.display = 'inline-flex';
          } else {
            indicator.style.display = 'none';
          }
        }
      });

      // Listen for other events
      whysperAPI.onRecordingStarted(() => {
        handleRecordingStarted();
      });

      whysperAPI.onRecordingStopped(() => {
        handleRecordingStopped();
      });

      whysperAPI.onSessionCleared(() => {
        addMessage('Session memory has been cleared', 'system');
        meetingListener.transcriptBuffer.segments = [];
        meetingListener.transcriptBuffer.lastAnswerAt = 0;
        meetingListener.audioChunksSinceLastAnswer = [];
        refreshTranscriptPreview();
      });

      whysperAPI.onTranscriptionLlmResponse((event, data) => {
        if (data && data.response) {
          // Hide thinking indicator
          hideThinkingIndicator();

          // Add assistant response with formatting
          addMessage(data.response, 'assistant');
        }
      });

      // Screenshot for AI events
      whysperAPI.onScreenshotCaptured(async (event, data) => {
        if (data && data.hasPendingScreenshot) {
          hasPendingScreenshot = true;
          showScreenshotBanner();
          addMessage('📸 Screenshot captured! Type your question about this screenshot.', 'system');
        }
      });

      whysperAPI.onScreenshotProcessed((event, data) => {
        if (data && !data.hasPendingScreenshot) {
          hasPendingScreenshot = false;
          hideScreenshotBanner();
        }
      });

      whysperAPI.onScreenshotError((event, data) => {
        if (data && data.error) {
          addMessage(`Screenshot error: ${data.error}`, 'error');
          hasPendingScreenshot = false;
          hideScreenshotBanner();
        }
      });
    }

    // UI Event Listeners
    if (micButton) {
      micButton.addEventListener('click', async () => {
        if (!isInteractive) {
          addMessage('Window is in non-interactive mode. Press Alt+A to enable interaction.', 'error');
          return;
        }

        try {
          addMessage(isListening ? 'Stopping meeting capture...' : 'Starting meeting capture (share screen + system audio)...', 'system');
          const result = await meetingListener.toggle();
          if (result?.error) {
            addMessage(`⚠️ ${result.error}`, 'error');
          }
        } catch (error) {
          addMessage(`⚠️ Meeting audio error: ${error.message}`, 'error');
        }
      });
    } else {
      console.error('🎤 micButton element not found!');
    }

    if (sendButton) {
      sendButton.addEventListener('click', () => {
        submitAnswer();
      });
    }

    if (messageInput) {
      messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          submitAnswer();
        }
      });
    }

    // Toggle panels & action buttons
    if (toggleTranscriptBtn) {
      toggleTranscriptBtn.addEventListener('click', toggleTranscript);
    }
    if (toggleActivityBtn) {
      toggleActivityBtn.addEventListener('click', toggleActivity);
    }
    if (clearSessionBtn) {
      clearSessionBtn.addEventListener('click', async () => {
        if (confirm('Clear session history and meeting transcripts?')) {
          if (whysperAPI && whysperAPI.clearSessionMemory) {
            await whysperAPI.clearSessionMemory();
          }
        }
      });
    }
    if (exportTranscriptBtn) {
      exportTranscriptBtn.addEventListener('click', exportTranscript);
    }
    if (closeActivityBtn) {
      closeActivityBtn.addEventListener('click', toggleActivity);
    }

    // Screenshot banner functions
    async function showScreenshotBanner() {
      if (!screenshotBanner || !screenshotIndicator) return;

      // Try to load the screenshot preview
      try {
        if (whysperAPI && whysperAPI.getPendingScreenshotPreview) {
          const preview = await whysperAPI.getPendingScreenshotPreview();
          if (preview && preview.hasScreenshot && preview.imageData) {
            screenshotPreview.src = `data:${preview.imageData.mimeType};base64,${preview.imageData.base64}`;
          }
        }
      } catch (error) {
        console.error('Failed to load screenshot preview:', error);
      }

      screenshotBanner.classList.add('active');
      screenshotIndicator.classList.add('active');

      // Update input placeholder
      if (messageInput) {
        messageInput.placeholder = 'Ask about this screenshot...';
      }
    }

    function hideScreenshotBanner() {
      if (screenshotBanner) {
        screenshotBanner.classList.remove('active');
      }
      if (screenshotIndicator) {
        screenshotIndicator.classList.remove('active');
      }
      if (screenshotPreview) {
        screenshotPreview.src = '';
      }

      // Reset input placeholder
      if (messageInput) {
        messageInput.placeholder = 'Type a message or transcription...';
      }
    }

    // Screenshot dismiss button handler
    if (screenshotDismiss) {
      screenshotDismiss.addEventListener('click', async () => {
        try {
          if (whysperAPI && whysperAPI.clearPendingScreenshot) {
            await whysperAPI.clearPendingScreenshot();
          }
          hasPendingScreenshot = false;
          hideScreenshotBanner();
          addMessage('Screenshot dismissed.', 'system');
        } catch (error) {
          console.error('Failed to clear screenshot:', error);
        }
      });
    }

    // Check for pending screenshot on load
    async function checkPendingScreenshot() {
      try {
        if (whysperAPI && whysperAPI.hasPendingScreenshot) {
          const result = await whysperAPI.hasPendingScreenshot();
          if (result && result.hasPendingScreenshot) {
            hasPendingScreenshot = true;
            showScreenshotBanner();
          }
        }
      } catch (error) {
        console.error('Failed to check pending screenshot:', error);
      }
    }

    // Global keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.altKey && e.key === 'r') {
        e.preventDefault();
        micButton.click();
      }
    });

    // Listen for continuous listening toggle from main process (Alt+R / main window mic)
    if (whysperAPI && whysperAPI.onToggleContinuousListening) {
      whysperAPI.onToggleContinuousListening(async () => {
        try {
          await meetingListener.toggle();
        } catch (error) {
          addMessage(`⚠️ Error: ${error.message}`, 'error');
        }
      });
    }

    // Initialize
    addMessage('Meeting assistant ready. Toggle 🎤 (or Alt+R) to capture meeting audio. Press Enter to answer.', 'system');

    // Check for pending screenshot on window load
    checkPendingScreenshot();

    // Restore meeting transcript history from main process (for post-meeting features)
    (async function loadPersistedTranscript() {
      try {
        if (whysperAPI?.getMeetingTranscript) {
          const result = await whysperAPI.getMeetingTranscript();
          if (result?.transcript) {
            meetingListener.transcriptBuffer.loadFromJSON(result.transcript);
            refreshTranscriptPreview();
          }
        }
      } catch (error) {
        console.warn('Could not load persisted meeting transcript:', error);
      }
    })();

    // Restore collapsible panel states from localStorage
    const savedTranscriptCollapsed = localStorage.getItem('transcriptCollapsed') !== 'false';
    const savedActivityCollapsed = localStorage.getItem('activityCollapsed') !== 'false';

    if (!savedTranscriptCollapsed) {
      transcriptPane.classList.remove('collapsed');
      toggleTranscriptBtn.classList.add('active');
      // Resize window to 800px width on load if transcript was open
      setTimeout(async () => {
        if (whysperAPI && whysperAPI.getWindowStats && whysperAPI.resizeWindow) {
          try {
            const stats = await whysperAPI.getWindowStats();
            const chatWindow = stats.windows?.chat;
            const currentHeight = chatWindow ? chatWindow.height : 700;
            await whysperAPI.resizeWindow(800, currentHeight);
          } catch (e) {}
        }
      }, 500);
    }

    if (!savedActivityCollapsed) {
      activityPane.classList.remove('collapsed');
      toggleActivityBtn.classList.add('active');
    }

    // Debug: Press F12 to toggle DevTools
    document.addEventListener('keydown', (e) => {
      if (e.key === 'F12') {
        e.preventDefault();
        // Try to open DevTools via Electron
        if (window.require) {
          try {
            const { remote } = window.require('electron');
            remote.getCurrentWindow().webContents.toggleDevTools();
          } catch (err) {
            console.log('DevTools: Cannot open programmatically');
          }
        }
      }
    });

    // Log initialization status
    console.log('=== Chat Window Initialized ===');
    console.log('Meeting listening ready:', !!meetingListener);
    console.log('whysperAPI available:', !!whysperAPI);
    console.log('micButton found:', !!micButton);
    console.log('messageInput found:', !!messageInput);

    // --- Copy on Selection Implementation ---
    (function () {
      // Create the tooltip element
      const copyTooltip = document.createElement('div');
      copyTooltip.className = 'copy-tooltip';
      copyTooltip.style.display = 'none';
      copyTooltip.innerHTML = `
          <span class="copy-text">Copy</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        `;
      document.body.appendChild(copyTooltip);

      // Styles for the tooltip
      const style = document.createElement('style');
      style.textContent = `
          .copy-tooltip {
            position: fixed;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-family: sans-serif;
            cursor: pointer;
            z-index: 99999;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            user-select: none;
            -webkit-app-region: no-drag;
          }
          .copy-tooltip:hover {
            background: rgba(60, 60, 60, 1);
            border-color: rgba(255, 255, 255, 0.5);
          }
          .copy-tooltip.copied {
            background: rgba(46, 125, 50, 0.95);
            border-color: rgba(76, 175, 80, 0.6);
          }
        `;
      document.head.appendChild(style);

      let debounceTimer = null;

      // Listen for selection changes
      document.addEventListener('selectionchange', () => {
        if (debounceTimer) clearTimeout(debounceTimer);
        debounceTimer = setTimeout(handleSelection, 100);
      });

      // Also listen for mouseup as a fallback
      document.addEventListener('mouseup', () => {
        if (debounceTimer) clearTimeout(debounceTimer);
        debounceTimer = setTimeout(handleSelection, 50);
      });

      function handleSelection() {
        const selection = window.getSelection();

        if (selection && !selection.isCollapsed && selection.toString().trim().length > 0) {
          try {
            const range = selection.getRangeAt(0);
            const rect = range.getBoundingClientRect();

            if (rect.width > 0 && rect.height > 0) {
              showTooltip(rect);
              return;
            }
          } catch (e) {
            console.error('Selection error:', e);
          }
        }

        hideTooltip();
      }

      function showTooltip(rect) {
        const tooltipHeight = 32;
        const tooltipWidth = 80;

        let top = rect.top - tooltipHeight - 8;
        let left = rect.left + (rect.width / 2) - (tooltipWidth / 2);

        // Keep within viewport
        if (top < 10) top = rect.bottom + 8;
        if (left < 10) left = 10;
        if (left + tooltipWidth > window.innerWidth - 10) left = window.innerWidth - tooltipWidth - 10;

        copyTooltip.style.top = `${top}px`;
        copyTooltip.style.left = `${left}px`;
        copyTooltip.style.display = 'flex';
        copyTooltip.classList.remove('copied');
        copyTooltip.querySelector('.copy-text').textContent = 'Copy';
      }

      function hideTooltip() {
        copyTooltip.style.display = 'none';
      }

      // Handle click on tooltip
      copyTooltip.addEventListener('mousedown', async (e) => {
        e.preventDefault();
        e.stopPropagation();

        const selection = window.getSelection();
        const text = selection.toString();

        if (text) {
          try {
            // Use Electron's clipboard API via preload
            if (window.electronAPI && window.electronAPI.writeToClipboard) {
              const result = await window.electronAPI.writeToClipboard(text);
              if (result.success) {
                copyTooltip.classList.add('copied');
                copyTooltip.querySelector('.copy-text').textContent = 'Copied!';
                setTimeout(hideTooltip, 1200);
              } else {
                throw new Error(result.error || 'Clipboard write failed');
              }
            } else {
              // Fallback to navigator.clipboard
              await navigator.clipboard.writeText(text);
              copyTooltip.classList.add('copied');
              copyTooltip.querySelector('.copy-text').textContent = 'Copied!';
              setTimeout(hideTooltip, 1200);
            }
          } catch (err) {
            console.error('Copy failed:', err);
            copyTooltip.querySelector('.copy-text').textContent = 'Error';
          }
        }
      });

      // Hide on scroll
      document.addEventListener('scroll', hideTooltip, { capture: true, passive: true });
    })();
  </script>
</body>

</html>
